<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0e0f11">
  <title>Kasboek — Offline</title>
  <style>
    :root { color-scheme: dark; }
    body {
      margin: 0;
      min-height: 100dvh;
      display: grid;
      place-items: center;
      background: #0e0f11;
      color: #e8e9ec;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      padding: 16px;
      text-align: center;
    }
    .card {
      max-width: 360px;
      border: 1px solid #2a2d35;
      border-radius: 12px;
      background: #16181c;
      padding: 20px;
    }
    h1 { margin: 0 0 8px; font-size: 1.2rem; }
    p { margin: 0; opacity: 0.85; line-height: 1.5; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Je bent offline</h1>
    <p>Kasboek is geïnstalleerd. Zodra je opnieuw verbinding hebt, werkt alles weer volledig.</p>
  </div>
</body>
</html>
